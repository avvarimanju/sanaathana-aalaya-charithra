name: EAS Build

on:
  push:
    branches: [master, main]
    paths:
      - 'mobile-app/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Android AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'
          cache-dependency-path: mobile-app/package-lock.json

      - name: Install dependencies
        working-directory: mobile-app
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Verify EAS CLI version
        run: eas --version

      - name: Build Android AAB
        working-directory: mobile-app
        run: eas build --platform android --profile internal-testing --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload build artifact info
        if: always()
        run: |
          echo "Build completed. Check EAS dashboard for AAB file:"
          echo "https://expo.dev/accounts/avvarimanju/projects/sanaathana-aalaya-charithra-mobile/builds"
